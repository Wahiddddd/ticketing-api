version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ticketing_db
    restart: always
    environment:
      MYSQL_DATABASE: db_ticketing
      MYSQL_ROOT_PASSWORD: dibimbing123
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: ticketing_app
    restart: always
    ports:
      - "8085:8085"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_URL=jdbc:mysql://db:3306/db_ticketing?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - DB_USERNAME=root
      - DB_PASSWORD=dibimbing123
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
